<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/L.Control.Locate.min.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/MarkerCluster.css">
        <link rel="stylesheet" href="css/MarkerCluster.Default.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        /* Panel flotante discreto para el control del cluster */
        #control-cluster-flotante {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 8px;
            border-radius: 6px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font-family: Arial, sans-serif;
        }
        .btn-cluster {
            background-color: #008CBA;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: background 0.3s;
        }
        </style>
        <title>Censo Alumbrado Público</title>
    </head>
    <body>
        <div id="map"></div>

        <div id="control-cluster-flotante">
            <button id="btn-toggle-cluster" class="btn-cluster" onclick="toggleClusterGlobal()">Cluster: ACTIVO 🟢</button>
        </div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet.markercluster.js"></script>
        <script src="data/PUNTOSMAPA_1.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[16.900543150568552,-99.86561451932802],[16.94767573569869,-99.77094374417881]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.update(); }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    video.addEventListener('loadedmetadata', function() { popup.update(); });
                    setTimeout(function() { popup.setContent(tempDiv.innerHTML); popup.update(); }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() { }

        map.createPane('pane_MAPACALLESG_0');
        map.getPane('pane_MAPACALLESG_0').style.zIndex = 400;
        var layer_MAPACALLESG_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_MAPACALLESG_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1, maxZoom: 28, minNativeZoom: 0, maxNativeZoom: 18
        });
        map.addLayer(layer_MAPACALLESG_0);

        function pop_PUNTOSMAPA_1(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2">' + (feature.properties['today'] !== null ? autolinker.link(String(feature.properties['today']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['_UBICACIN_latitude'] !== null ? autolinker.link(String(feature.properties['_UBICACIN_latitude']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2">' + (feature.properties['_UBICACIN_longitude'] !== null ? autolinker.link(String(feature.properties['_UBICACIN_longitude']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td colspan="2"><strong>POSTE</strong><br />' + (feature.properties['POSTE'] !== null ? autolinker.link(String(feature.properties['POSTE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td class="visible-with-data" id="TOMAR FOTO_URL" colspan="2"><strong>TOMAR FOTO_URL</strong><br />' + (feature.properties['TOMAR FOTO_URL'] !== null ? autolinker.link(String(feature.properties['TOMAR FOTO_URL']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><th scope="row">BITACORAV.CUADRILLA</th><td>' + (feature.properties['BITACORAV.CUADRILLA'] !== null ? autolinker.link(String(feature.properties['BITACORAV.CUADRILLA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                    <tr><td class="visible-with-data" id="BITACORAV.Colonia_Plan" colspan="2"><strong>BITACORAV.Colonia_Plan</strong><br />' + (feature.properties['BITACORAV.Colonia_Plan'] !== null ? autolinker.link(String(feature.properties['BITACORAV.Colonia_Plan']).replace(/'/g, '\'').toLocaleString()) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function(e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_PUNTOSMAPA_1_0(feature) {
            switch(String(feature.properties['BITACORAV.CUADRILLA'])) {
                case 'ANA': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(206,152,110,1.0)', interactive: true }; break;
                case 'BERENICE': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(211,67,149,1.0)', interactive: true }; break;
                case 'GABRIEL': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(188,234,131,1.0)', interactive: true }; break;
                case 'GERARDO': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(206,71,216,1.0)', interactive: true }; break;
                case 'LILIANA': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(163,114,228,1.0)', interactive: true }; break;
                case 'NATIVIDAD': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(74,236,228,1.0)', interactive: true }; break;
                case 'NESTOR': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(234,136,142,1.0)', interactive: true }; break;
                case 'PAUL': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(129,180,219,1.0)', interactive: true }; break;
                case 'REYNALDO': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(14,219,106,1.0)', interactive: true }; break;
                case 'SAUL': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(76,224,69,1.0)', interactive: true }; break;
                case 'STEPHANY': return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(88,97,216,1.0)', interactive: true }; break;
                default: return { pane: 'pane_PUNTOSMAPA_1', radius: 4.0, opacity: 1, color: 'rgba(35,35,35,1.0)', weight: 1, fill: true, fillOpacity: 1, fillColor: 'rgba(230,224,120,1.0)', interactive: true }; break;
            }
        }

        map.createPane('pane_PUNTOSMAPA_1');
        map.getPane('pane_PUNTOSMAPA_1').style.zIndex = 401;
        map.getPane('pane_PUNTOSMAPA_1').style['mix-blend-mode'] = 'normal';

        // Capa GeoJSON Base
        var layer_PUNTOSMAPA_1 = new L.geoJson(json_PUNTOSMAPA_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_PUNTOSMAPA_1',
            layerName: 'layer_PUNTOSMAPA_1',
            pane: 'pane_PUNTOSMAPA_1',
            onEachFeature: pop_PUNTOSMAPA_1,
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, style_PUNTOSMAPA_1_0(feature));
            },
        });

        // Contenedor Cluster Group
        var cluster_PUNTOSMAPA_1 = new L.MarkerClusterGroup({
            showCoverageOnHover: false,
            spiderfyDistanceMultiplier: 2
        });
        
        // Estado inicial: Empezamos con el cluster activo como estaba originalmente
        var clusterHabilitado = true;
        cluster_PUNTOSMAPA_1.addLayer(layer_PUNTOSMAPA_1);
        map.addLayer(cluster_PUNTOSMAPA_1);
        bounds_group.addLayer(layer_PUNTOSMAPA_1);

        // FUNCIÓN DEL BOTÓN: Intercambia dinámicamente entre Cluster y Capa plana
        function toggleClusterGlobal() {
            var boton = document.getElementById('btn-toggle-cluster');
            clusterHabilitado = !clusterHabilitado;

            if (clusterHabilitado) {
                // Quitar puntos sueltos y meterlos al cluster
                map.removeLayer(layer_PUNTOSMAPA_1);
                cluster_PUNTOSMAPA_1.addLayer(layer_PUNTOSMAPA_1);
                map.addLayer(cluster_PUNTOSMAPA_1);
                
                boton.innerText = "Cluster: ACTIVO 🟢";
                boton.style.backgroundColor = "#008CBA";
            } else {
                // Desarmar el cluster por completo y pintar directo en el mapa
                cluster_PUNTOSMAPA_1.clearLayers();
                map.removeLayer(cluster_PUNTOSMAPA_1);
                map.addLayer(layer_PUNTOSMAPA_1);
                
                boton.innerText = "Cluster: INACTIVO 🔴";
                boton.style.backgroundColor = "#d33333";
            }
        }

        // Configuración original del Buscador Photon
        const url = {"Nominatim OSM": "https://nominatim.openstreetmap.org/search?format=geojson&addressdetails=1&", "France BAN": "https://api-adresse.data.gouv.fr/search/?"}
        var photonControl = L.control.photon({
            url: url["Nominatim OSM"], feedbackLabel: '', position: 'topleft', includePosition: true, initial: true,
        }).addTo(map);
        photonControl._container.childNodes[0].style.borderRadius="10px"
        
        var x = null; var marker = null; var z = null;
        photonControl.on('selected', function(e) {
            if (x != null) { map.removeLayer(obj3.marker); map.removeLayer(x); }
            obj2.gcd = e.choice;
            x = L.geoJSON(obj2.gcd).addTo(map);
            var label = typeof obj2.gcd.properties.label === 'undefined' ? obj2.gcd.properties.display_name : obj2.gcd.properties.label;
            obj3.marker = L.marker(x.getLayers()[0].getLatLng()).bindPopup(label).addTo(map);
            map.setView(x.getLayers()[0].getLatLng(), 17);
            z = typeof e.choice.properties.label === 'undefined'? e.choice.properties.display_name : e.choice.properties.label;
            e.target.input.value = z;
        });

        var search = document.getElementsByClassName("leaflet-photon leaflet-control")[0];
        search.classList.add("leaflet-control-search");
        search.style.display = "flex";
        search.style.backgroundColor="rgba(255,255,255,0.5)";

        var button = document.createElement("div");
        button.id = "gcd-button-control";
        button.className = "gcd-gl-btn fa fa-search search-button";
        search.insertBefore(button, search.firstChild);
        last = search.lastChild;
        last.style.display = "none";
        button.addEventListener("click", function (e) {
            if (last.style.display === "none") { last.style.display = "block"; } else { last.style.display = "none"; }
        });

        // Árbol de capas nativo de tu QGIS
        var overlaysTree = [
            {label: 'PUNTOS MAPA<br /><table><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_ANA0.png" /></td><td>ANA</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_BERENICE1.png" /></td><td>BERENICE</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_GABRIEL2.png" /></td><td>GABRIEL</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_GERARDO3.png" /></td><td>GERARDO</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_LILIANA4.png" /></td><td>LILIANA</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_NATIVIDAD5.png" /></td><td>NATIVIDAD</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_NESTOR6.png" /></td><td>NESTOR</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_PAUL7.png" /></td><td>PAUL</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_REYNALDO8.png" /></td><td>REYNALDO</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_SAUL9.png" /></td><td>SAUL</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_STEPHANY10.png" /></td><td>STEPHANY</td></tr><tr><td style="text-align: center;"><img src="legend/PUNTOSMAPA_1_11.png" /></td><td></td></tr></table>', layer: cluster_PUNTOSMAPA_1},
            {label: "MAPACALLESG", layer: layer_MAPACALLESG_0, radioGroup: 'bm' },
        ];
        var lay = L.control.layers.tree(null, overlaysTree,{ collapsed: true });
        lay.addTo(map);
        
        // Inicialización segura de límites geométricos
        if (typeof setBounds === 'function') { setBounds(); }
        </script>        
    </body>
</html>
